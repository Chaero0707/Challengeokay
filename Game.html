<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바둑 대국 신청 안내</title>
    <link rel="stylesheet" href="about.css">
</head>
<body>

    <div class="about-container">
        <!-- 프로필 상단 영역 -->
        <div class="profile-header">
            <!-- 프로필 이미지가 있다면 이미지 태그를 사용하시고, 없으면 기본 원형 배경이 작동합니다 -->
            <div class="profile-img">🧑‍💻</div>
            <h1 class="profile-name">한지석</h1>
            <p class="profile-tagline">바둑 대국 신청 문의</p>
        </div>

        <!-- 프로필 상세 정보 (키워드/스펙) -->
        <div class="profile-info">
            <div class="info-item">
                <span class="info-label">Email</span>
                <span class="info-value">kongkongred16@gmail.com</span>
            </div>
            <div class="info-item">
                <span class="info-label">GitHub</span>
                <span class="info-value"><a href="https://github.com" target="_blank">://github.com</a></span>
            </div>
        </div>

        <!-- 동적 작동 버튼 -->
        <button id="toggle-btn" class="intro-btn">더 알아보기</button>

        <!-- 💡 숨겨진 상세 자기소개 글 영역 (JS로 제어) -->
        <div id="more-intro" class="hidden-intro">
            <div class="intro-content">
                <h3>대국 신청 안내</h3>
                <!-- 준비하신 자기소개 글을 아래 <p> 태그 안에 자유롭게 바꾸어 넣으세요 -->
                <p>바둑 대국 신청은 ogs 로 연락바랍니다</p>
                <p>이메일로도 연락해주세요</p>
            </div>
        </div>
    </div>

    <script src="대국신청.js"></script>
</body>
</html>

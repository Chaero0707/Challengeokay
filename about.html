<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자기소개 | About Me</title>
    <link rel="stylesheet" href="about.css">
</head>
<body>

    <div class="about-container">
        <!-- 프로필 상단 영역 -->
        <div class="profile-header">
            <!-- 프로필 이미지가 있다면 이미지 태그를 사용하시고, 없으면 기본 원형 배경이 작동합니다 -->
            <div class="profile-img">🧑‍💻</div>
            <h1 class="profile-name">한지석</h1>
            <p class="profile-tagline">끊임없이 성장하는 웹 개발자 지망생</p>
        </div>

        <!-- 프로필 상세 정보 (키워드/스펙) -->
        <div class="profile-info">
            <div class="info-item">
                <span class="info-label">Email</span>
                <span class="info-value">kongkongred16@gmail.com</span>
            </div>
            <div class="info-item">
                <span class="info-label">GitHub</span>
                <span class="info-value"><a href="https://github.com" target="_blank">://github.com</a></span>
            </div>
            <div class="info-item">
                <span class="info-label">Tech Stack</span>
                <span class="info-value">HTML5, CSS3, JavaScript, Git</span>
            </div>
        </div>

        <!-- 동적 작동 버튼 -->
        <button id="toggle-btn" class="intro-btn">더 알아보기</button>

        <!-- 💡 숨겨진 상세 자기소개 글 영역 (JS로 제어) -->
        <div id="more-intro" class="hidden-intro">
            <div class="intro-content">
                <h3>안녕하세요, 한지석입니다!</h3>
                <!-- 준비하신 자기소개 글을 아래 <p> 태그 안에 자유롭게 바꾸어 넣으세요 -->
                <p>여기에 준비하신 첫 번째 자기소개 글 문단을 넣으시면 됩니다. 코딩을 시작하게 된 계기나 현재 관심 있는 분야에 대해 적어보세요.</p>
                <p>여기는 두 번째 문단입니다. 앞으로의 목표나 협업하고 싶은 방향, 혹은 다짐 등을 멋지게 채워 넣으실 수 있습니다.</p>
            </div>
        </div>
    </div>

    <script src="about.js"></script>
</body>
</html>
